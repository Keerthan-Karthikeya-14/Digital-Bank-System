# ===========================================
# Digital Banking System - Application Config
# ===========================================

spring.application.name=digital-banking-system

# ===========================================
# Server Configuration
# ===========================================
server.port=8080

# ===========================================
# MySQL Database Configuration
# ===========================================
spring.datasource.url=jdbc:mysql://localhost:3306/bankdatabase?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=
# ===========================================
# JPA / Hibernate Configuration
# ===========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hibernate dialect auto-detected from database connection

# ===========================================
# JWT Configuration
# ===========================================
app.jwt.secret=${JWT_SECRET:digitalBankingSecretKeyForJWTTokenGenerationAndValidation2025}
app.jwt.expiration=86400000

# ===========================================
# Thymeleaf Configuration
# ===========================================
spring.thymeleaf.cache=false

# ===========================================
# Logging Configuration
# ===========================================
logging.level.com.digitalbanking=DEBUG
logging.level.org.hibernate.SQL=DEBUG
