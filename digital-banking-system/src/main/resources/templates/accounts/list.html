<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: html(content=~{::main}, pageTitle='My Account')}">
<head>
    <title>My Account</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
        <h1 class="h2">My Account</h1>
    </div>

    <div th:if="${#lists.isEmpty(accounts)}" class="text-center py-5">
        <i class="bi bi-wallet2 text-muted" style="font-size: 5rem;"></i>
        <h3 class="mt-3">Account Not Found</h3>
        <p class="text-muted">Please contact support if you don't see your account.</p>
    </div>

    <div class="row" th:unless="${#lists.isEmpty(accounts)}">
        <div th:each="account : ${accounts}" class="col-lg-8 mx-auto">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center bg-primary text-white">
                    <span>
                        <i class="bi bi-wallet2 me-2"></i>
                        <span th:text="${account.accountType}">SAVINGS</span> Account
                    </span>
                    <span th:text="${account.status}" class="badge"
                          th:classappend="${account.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-danger'">
                        Status
                    </span>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="text-muted small">Account Number</label>
                            <p class="font-monospace h5 mb-0" th:text="${account.accountNumber}">1234567890</p>
                        </div>
                        <div class="col-md-6 mb-3 text-md-end">
                            <label class="text-muted small">Current Balance</label>
                            <h2 class="text-primary mb-0" th:text="'₹' + ${#numbers.formatDecimal(account.balance, 1, 2)}">₹0.00</h2>
                        </div>
                    </div>
                </div>
                <div class="card-footer bg-transparent">
                    <div class="row text-center">
                        <div class="col-4">
                            <a th:href="@{/transactions/deposit}" class="btn btn-success w-100">
                                <i class="bi bi-plus-circle d-block mb-1" style="font-size: 1.5rem;"></i>
                                Deposit
                            </a>
                        </div>
                        <div class="col-4">
                            <a th:href="@{/transactions/withdraw}" class="btn btn-warning w-100">
                                <i class="bi bi-dash-circle d-block mb-1" style="font-size: 1.5rem;"></i>
                                Withdraw
                            </a>
                        </div>
                        <div class="col-4">
                            <a th:href="@{/transactions/transfer}" class="btn btn-primary w-100">
                                <i class="bi bi-arrow-left-right d-block mb-1" style="font-size: 1.5rem;"></i>
                                Transfer
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Account Details Link -->
            <div class="text-center mt-3">
                <a th:href="@{/accounts/{num}(num=${account.accountNumber})}" class="btn btn-outline-secondary">
                    <i class="bi bi-eye me-1"></i> View Full Account Details & Transaction History
                </a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
