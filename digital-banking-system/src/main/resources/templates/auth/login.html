<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digital Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d6efd 0%, #0143a3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-card {
            max-width: 400px;
            margin: auto;
        }

        .password-toggle {
            cursor: pointer;
            border-left: none;
        }

        .password-toggle:hover {
            background-color: #e9ecef;
        }

        .form-control:focus+.password-toggle {
            border-color: #86b7fe;
        }

        .is-invalid~.password-toggle {
            border-color: #dc3545;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="login-card card shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-bank2 text-primary" style="font-size: 3rem;"></i>
                    <h2 class="mt-2">Digital Bank</h2>
                    <p class="text-muted">Sign in to your account</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle me-2"></i>Invalid email or password
                </div>
                <div th:if="${param.logout}" class="alert alert-success">
                    <i class="bi bi-check-circle me-2"></i>You have been logged out successfully
                </div>
                <div th:if="${success}" class="alert alert-success">
                    <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                </div>

                <form id="loginForm" th:action="@{/login}" method="post" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label">Email <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="username" name="username"
                                placeholder="Enter your email" required autocomplete="email">
                            <div class="invalid-feedback">
                                Please enter a valid email address.
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="Enter your password" required autocomplete="current-password">
                            <span class="input-group-text password-toggle" id="togglePassword">
                                <i class="bi bi-eye" id="togglePasswordIcon"></i>
                            </span>
                            <div class="invalid-feedback">
                                Please enter your password.
                            </div>
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                            <span id="submitText">Sign In</span>
                            <span id="submitSpinner" class="spinner-border spinner-border-sm ms-2 d-none"
                                role="status"></span>
                        </button>
                    </div>
                </form>

                <hr class="my-4">

                <p class="text-center mb-0">
                    Don't have an account?
                    <a th:href="@{/register}" class="text-decoration-none">Register here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const togglePassword = document.getElementById('togglePassword');
            const toggleIcon = document.getElementById('togglePasswordIcon');
            const submitBtn = document.getElementById('submitBtn');
            const submitText = document.getElementById('submitText');
            const submitSpinner = document.getElementById('submitSpinner');

            // Password visibility toggle
            togglePassword.addEventListener('click', function () {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleIcon.classList.remove('bi-eye');
                    toggleIcon.classList.add('bi-eye-slash');
                } else {
                    passwordInput.type = 'password';
                    toggleIcon.classList.remove('bi-eye-slash');
                    toggleIcon.classList.add('bi-eye');
                }
                passwordInput.focus();
            });

            // Email validation function
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }

            // Real-time validation for email
            emailInput.addEventListener('blur', function () {
                if (this.value && !isValidEmail(this.value)) {
                    this.classList.add('is-invalid');
                    this.classList.remove('is-valid');
                } else if (this.value) {
                    this.classList.remove('is-invalid');
                    this.classList.add('is-valid');
                }
            });

            emailInput.addEventListener('input', function () {
                if (this.classList.contains('is-invalid') && isValidEmail(this.value)) {
                    this.classList.remove('is-invalid');
                    this.classList.add('is-valid');
                }
            });

            // Real-time validation for password
            passwordInput.addEventListener('blur', function () {
                if (!this.value) {
                    this.classList.add('is-invalid');
                    this.classList.remove('is-valid');
                } else {
                    this.classList.remove('is-invalid');
                    this.classList.add('is-valid');
                }
            });

            passwordInput.addEventListener('input', function () {
                if (this.classList.contains('is-invalid') && this.value) {
                    this.classList.remove('is-invalid');
                    this.classList.add('is-valid');
                }
            });

            // Form submission validation
            form.addEventListener('submit', function (e) {
                let isValid = true;

                // Validate email
                if (!emailInput.value || !isValidEmail(emailInput.value)) {
                    emailInput.classList.add('is-invalid');
                    isValid = false;
                } else {
                    emailInput.classList.remove('is-invalid');
                }

                // Validate password
                if (!passwordInput.value) {
                    passwordInput.classList.add('is-invalid');
                    isValid = false;
                } else {
                    passwordInput.classList.remove('is-invalid');
                }

                if (!isValid) {
                    e.preventDefault();
                    return;
                }

                // Show loading state
                submitBtn.disabled = true;
                submitText.textContent = 'Signing in...';
                submitSpinner.classList.remove('d-none');
            });
        });
    </script>
</body>

</html>
