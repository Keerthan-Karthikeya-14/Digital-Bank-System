<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sidebar Fragment</title>
</head>
<body>
<nav th:fragment="sidebar" id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse">
    <div class="position-sticky pt-3 sidebar-sticky">
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/dashboard}">
                    <i class="bi bi-speedometer2 me-2"></i>Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/accounts}">
                    <i class="bi bi-wallet2 me-2"></i>My Account
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/transactions}">
                    <i class="bi bi-clock-history me-2"></i>Transactions
                </a>
            </li>
        </ul>

        <h6 class="sidebar-heading d-flex justify-content-between align-items-center px-3 mt-4 mb-1 text-muted">
            <span>Quick Actions</span>
        </h6>
        <ul class="nav flex-column mb-2">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/transactions/transfer}">
                    <i class="bi bi-arrow-left-right me-2"></i>Transfer
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/transactions/deposit}">
                    <i class="bi bi-plus-circle me-2"></i>Deposit
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/transactions/withdraw}">
                    <i class="bi bi-dash-circle me-2"></i>Withdraw
                </a>
            </li>
        </ul>
    </div>
</nav>
</body>
</html>
