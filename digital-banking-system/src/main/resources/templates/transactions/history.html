<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/main :: html(content=~{::main}, pageTitle='Transaction History')}">
<head>
    <title>Transaction History</title>
</head>
<body>
<main>
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
        <h1 class="h2">Transaction History</h1>
        <div class="btn-group">
            <a th:href="@{/transactions/transfer}" class="btn btn-outline-primary">
                <i class="bi bi-arrow-left-right me-1"></i> Transfer
            </a>
            <a th:href="@{/transactions/deposit}" class="btn btn-outline-success">
                <i class="bi bi-plus-circle me-1"></i> Deposit
            </a>
            <a th:href="@{/transactions/withdraw}" class="btn btn-outline-warning">
                <i class="bi bi-dash-circle me-1"></i> Withdraw
            </a>
        </div>
    </div>

    <div th:if="${transactions.isEmpty()}" class="text-center py-5">
        <i class="bi bi-clock-history text-muted" style="font-size: 5rem;"></i>
        <h3 class="mt-3">No Transactions Yet</h3>
        <p class="text-muted">Your transaction history will appear here.</p>
    </div>

    <div class="card" th:unless="${transactions.isEmpty()}">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Date & Time</th>
                            <th>Reference</th>
                            <th>Type</th>
                            <th>From Account</th>
                            <th>To Account</th>
                            <th>Description</th>
                            <th class="text-end">Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="txn : ${transactions.content}">
                            <td th:text="${#temporals.format(txn.createdAt, 'MMM dd, yyyy HH:mm')}">Date</td>
                            <td class="font-monospace small" th:text="${txn.referenceId}">Reference</td>
                            <td>
                                <span th:switch="${txn.type}">
                                    <span th:case="'DEPOSIT'" class="badge bg-success">
                                        <i class="bi bi-plus-circle me-1"></i>Deposit
                                    </span>
                                    <span th:case="'WITHDRAWAL'" class="badge bg-danger">
                                        <i class="bi bi-dash-circle me-1"></i>Withdrawal
                                    </span>
                                    <span th:case="'TRANSFER'" class="badge bg-info">
                                        <i class="bi bi-arrow-left-right me-1"></i>Transfer
                                    </span>
                                </span>
                            </td>
                            <td class="font-monospace small" th:text="${txn.fromAccountNumber ?: '-'}">From</td>
                            <td class="font-monospace small" th:text="${txn.toAccountNumber ?: '-'}">To</td>
                            <td th:text="${txn.description ?: '-'}">Description</td>
                            <td class="text-end fw-bold"
                                th:classappend="${txn.type.name() == 'DEPOSIT'} ? 'text-success' : 'text-danger'"
                                th:text="(${txn.type.name() == 'DEPOSIT'} ? '+₹' : '-₹') + ${#numbers.formatDecimal(txn.amount, 1, 2)}">
                                Amount
                            </td>
                            <td>
                                <span th:text="${txn.status}" class="badge"
                                      th:classappend="${txn.status.name() == 'COMPLETED'} ? 'bg-success' : (${txn.status.name() == 'PENDING'} ? 'bg-warning' : 'bg-danger')">
                                    Status
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <nav th:if="${transactions.totalPages > 1}" aria-label="Transaction pages">
                <ul class="pagination justify-content-center mb-0">
                    <li class="page-item" th:classappend="${transactions.first} ? 'disabled'">
                        <a class="page-link" th:href="@{/transactions(page=${transactions.number - 1})}">Previous</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, transactions.totalPages - 1)}"
                        class="page-item" th:classappend="${i == transactions.number} ? 'active'">
                        <a class="page-link" th:href="@{/transactions(page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${transactions.last} ? 'disabled'">
                        <a class="page-link" th:href="@{/transactions(page=${transactions.number + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
</body>
</html>
